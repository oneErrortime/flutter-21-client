name: voice_call
description: P2P E2E Encrypted Voice Call App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  # WebRTC — RFC 8825 / 8829 / DTLS-SRTP (RFC 5764)
  # PINNED to 0.12.0: versions 0.12.12+ use TextureRegistry.SurfaceProducer.Callback,
  # which was added only in Flutter 3.27. Flutter 3.22.x doesn't have this interface
  # and fails with "cannot find symbol: class Callback" at compile time.
  # If upgrading Flutter to 3.27+, this pin can be relaxed back to ^0.12.0.
  flutter_webrtc: 0.12.0

  # Networking
  dio: ^5.3.4
  web_socket_channel: ^2.4.0

  # Secure storage (Keystore / Keychain)
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^12.1.3

  # Permissions (mic, bluetooth, etc.)
  permission_handler: ^11.1.0

  # Push notifications (incoming calls when app is background)
  # firebase_core ^3.x and firebase_messaging ^15.x use dart:js_interop
  # instead of the old package:js interop (PromiseJsImpl / handleThenable /
  # dartify) that broke dart2js compilation with Flutter 3.22 / Dart 3.
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Local notifications (foreground call UI)
  flutter_local_notifications: ^17.0.0

  # Deep links for room join — ^6.x uses web ^1.0.0, compatible with flutter_webrtc ^0.12.0
  app_links: ^6.4.0

  # UI helpers
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # UUID generation
  uuid: ^4.2.2

  # Crypto helpers (fingerprint display for key verification)
  crypto: ^3.0.3

  # AES-256-GCM for signaling payload decryption
  cryptography: ^2.7.0

  # Haptic feedback
  vibration: ^1.8.4

  # Keep screen on during calls
  wakelock_plus: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
