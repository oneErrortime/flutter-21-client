// ── Flutter app/build.gradle ─────────────────────────────────────────────────
//
// Flutter 3.22 / AGP 8.x — imperative apply-from style.
//
// The Flutter Gradle plugin is NOT published to the Gradle Plugin Portal,
// so the declarative `plugins { id "dev.flutter.flutter-gradle-plugin" }`
// block WILL FAIL with "plugin not found in any repository".
// The only correct approach is: apply from: "$flutterRoot/.../flutter.gradle"
// ─────────────────────────────────────────────────────────────────────────────

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException(
        "Flutter SDK not found. Set flutter.sdk in android/local.properties.")
}

// flutter.versionCode / flutter.versionName were removed from FlutterExtension
// in Flutter 3.22. Read them from local.properties (written by flutter tooling)
// or fall back to defaults so CI doesn't break on a clean checkout.
def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0.0'

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
// Flutter Gradle plugin MUST come after com.android.application
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

def keyPropertiesFile = rootProject.file('key.properties')
def keyProperties = new Properties()
if (keyPropertiesFile.exists()) {
    keyProperties.load(new FileInputStream(keyPropertiesFile))
}

android {
    namespace "com.voicecall"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        // Required by flutter_local_notifications (and any lib using Java 8+ APIs on API < 26)
        isCoreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.voicecall"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode   flutterVersionCode.toInteger()
        versionName   flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            keyAlias      keyProperties['keyAlias']      ?: 'release'
            keyPassword   keyProperties['keyPassword']   ?: ''
            storePassword keyProperties['storePassword'] ?: ''
            storeFile     keyProperties['storeFile']
                ? rootProject.file(keyProperties['storeFile']) : null
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'
        }
    }

    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a', 'armeabi-v7a', 'x86_64'
            universalApk false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Core library desugaring — enables Java 8+ APIs (java.time, etc.) on Android < API 26
    // Required by flutter_local_notifications
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'

    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-messaging-ktx'
    implementation 'com.google.firebase:firebase-analytics-ktx'
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"
}

apply plugin: 'com.google.gms.google-services'
