// ── Flutter app/build.gradle — Flutter 3.24+ declarative plugins style ───────
//
// Plugin versions are resolved via settings.gradle pluginManagement block.
// The old imperative `apply from: flutter.gradle` + `apply plugin:` style
// was removed in Flutter 3.24.
// ─────────────────────────────────────────────────────────────────────────────

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}

def keyPropertiesFile = rootProject.file('key.properties')
def keyProperties = new Properties()
if (keyPropertiesFile.exists()) {
    keyProperties.load(new FileInputStream(keyPropertiesFile))
}

android {
    namespace "com.voicecall"
    compileSdk flutter.compileSdkVersion
    ndkVersion "26.1.10909125"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.voicecall"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode   flutter.versionCode
        versionName   flutter.versionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            keyAlias      keyProperties['keyAlias']      ?: 'release'
            keyPassword   keyProperties['keyPassword']   ?: ''
            storePassword keyProperties['storePassword'] ?: ''
            storeFile     keyProperties['storeFile']
                ? rootProject.file(keyProperties['storeFile']) : null
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'

    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-messaging-ktx'
    implementation 'com.google.firebase:firebase-analytics-ktx'
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
}
