name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ────────────────────────────────────────────────────────────────────────────
# Android APK + App Bundle
# ────────────────────────────────────────────────────────────────────────────
jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_ROOT }}/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create keystore
        run: |
          mkdir -p android/keystore
          keytool -genkeypair -v \
            -keystore android/keystore/release.jks \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=VoiceCall CI, OU=CI, O=VoiceCall, L=CI, ST=CI, C=US" \
            -storepass cipass123 -keypass cipass123

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT"  >> android/local.properties

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=cipass123
          keyPassword=cipass123
          keyAlias=release
          storeFile=keystore/release.jks
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: flutter test
        run: flutter test --coverage || true

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Build release APKs
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --target-platform android-arm64,android-arm,android-x64 \
            --split-per-abi

      - name: Build App Bundle
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info || true

      - name: List APK outputs
        run: find build/app/outputs -name "*.apk" -o -name "*.aab" | sort

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

# ────────────────────────────────────────────────────────────────────────────
# Flutter Web → GitHub Pages
# ────────────────────────────────────────────────────────────────────────────
  web:
    name: Flutter Web + GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-web-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-web-${{ runner.os }}-

      - name: flutter pub get
        run: flutter pub get

      # canvaskit renderer — consistent rendering cross-browser.
      # Do NOT pass both FLUTTER_WEB_AUTO_DETECT=true and --web-renderer;
      # they conflict. Use one approach: either auto-detect OR explicit renderer.
      - name: Build Flutter Web
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit \
            --dart-define=FLUTTER_WEB_USE_SKIA=true \
            --base-href "/${{ github.event.repository.name }}/"

      - name: Copy web test client
        run: cp webclient/index.html build/web/webclient.html

      - name: Create server config
        run: |
          cat > build/web/config.js << 'JS'
          window.VOICECALL_CONFIG = {
            serverUrl: "wss://your-server.com/ws",
            apiBase:   "https://your-server.com",
          };
          JS
          sed -i 's|</head>|<script src="config.js"></script>\n</head>|' build/web/index.html || true
          sed -i 's|</head>|<script src="config.js"></script>\n</head>|' build/web/webclient.html || true

      - name: Create landing page
        run: |
          cat > build/web/landing.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>VoiceCall — Test Builds</title>
          <style>
            *{box-sizing:border-box;margin:0;padding:0}
            body{font-family:system-ui,sans-serif;background:#0d0d1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
            h1{font-size:1.8rem;margin-bottom:32px;color:#fff;text-align:center}
            .cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
            .card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:28px;max-width:280px;display:flex;flex-direction:column;gap:12px}
            .card p{color:#888;font-size:13px;line-height:1.6;flex:1}
            .card a{display:inline-block;padding:10px 22px;background:#533483;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;text-align:center}
            .card a:hover{background:#6040a0}
          </style>
          </head>
          <body>
          <div>
            <h1>🔊 VoiceCall Test Builds</h1>
            <div class="cards">
              <div class="card">
                <h2>⚡ Standalone Test Client</h2>
                <p>Pure HTML/JS WebRTC test client. Works in any browser. No Flutter needed.</p>
                <a href="webclient.html">Open Test Client</a>
              </div>
              <div class="card">
                <h2>📱 Flutter Web App</h2>
                <p>Full Flutter web build. Requires WebRTC (Chrome 80+, Firefox 75+, Safari 14+).</p>
                <a href="index.html">Open Flutter App</a>
              </div>
            </div>
          </div>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: pages
        uses: actions/deploy-pages@v4

      - name: Print live URLs
        run: |
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "🌐 Landing : ${BASE}/landing.html"
          echo "⚡ Test    : ${BASE}/webclient.html"
          echo "📱 Flutter : ${BASE}/"

# ────────────────────────────────────────────────────────────────────────────
# Rust server — fmt / clippy / build / test / Docker
#
# Postgres + Redis service containers are required because sqlx::query!()
# macros validate SQL against the live schema at compile time.
# SQLX_OFFLINE=false means: use the live DB (most thorough checking).
# ────────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust Server
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: voicecall_ci
          POSTGRES_USER: voicecall
          POSTGRES_PASSWORD: cipassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server-rust

    env:
      DATABASE_URL: postgres://voicecall:cipassword@localhost:5432/voicecall_ci
      REDIS_URL: redis://localhost:6379
      SQLX_OFFLINE: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-rust

      # Bootstrap the schema so sqlx macros can verify column types
      - name: Bootstrap database schema
        run: |
          sudo apt-get install -y --no-install-recommends postgresql-client 2>/dev/null
          PGPASSWORD=cipassword psql \
            -h localhost -U voicecall -d voicecall_ci << 'SQL'
            CREATE EXTENSION IF NOT EXISTS pgcrypto;

            CREATE TABLE IF NOT EXISTS users (
              id            BIGSERIAL PRIMARY KEY,
              user_id       UUID        NOT NULL UNIQUE DEFAULT gen_random_uuid(),
              username      VARCHAR(30) NOT NULL UNIQUE,
              email         VARCHAR(255) NOT NULL UNIQUE,
              display_name  VARCHAR(50) NOT NULL,
              avatar_url    TEXT,
              password_hash TEXT        NOT NULL,
              is_active     BOOLEAN     NOT NULL DEFAULT true,
              discoverable  BOOLEAN     NOT NULL DEFAULT true,
              last_seen     TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );

            CREATE TABLE IF NOT EXISTS rooms (
              id          BIGSERIAL PRIMARY KEY,
              room_id     UUID        NOT NULL UNIQUE DEFAULT gen_random_uuid(),
              created_by  UUID        NOT NULL REFERENCES users(user_id),
              is_active   BOOLEAN     NOT NULL DEFAULT true,
              expires_at  TIMESTAMPTZ NOT NULL DEFAULT NOW() + INTERVAL '24 hours',
              created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );

            CREATE TABLE IF NOT EXISTS contacts (
              id           UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
              requester_id UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
              target_id    UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
              status       TEXT        NOT NULL DEFAULT 'pending'
                               CHECK (status IN ('pending','accepted','blocked')),
              created_at   TIMESTAMPTZ NOT NULL DEFAULT now(),
              updated_at   TIMESTAMPTZ NOT NULL DEFAULT now(),
              UNIQUE (requester_id, target_id)
            );
            CREATE INDEX IF NOT EXISTS contacts_target_id_idx ON contacts (target_id);
            CREATE INDEX IF NOT EXISTS contacts_status_idx    ON contacts (status);

            CREATE TABLE IF NOT EXISTS invite_links (
              id         UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
              owner_id   UUID        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
              token      TEXT        NOT NULL UNIQUE,
              uses_left  INTEGER     NOT NULL DEFAULT 1,
              expires_at TIMESTAMPTZ NOT NULL DEFAULT now() + INTERVAL '24 hours',
              created_at TIMESTAMPTZ NOT NULL DEFAULT now()
            );
            CREATE INDEX IF NOT EXISTS invite_links_token_idx ON invite_links (token);
          SQL

      - name: cargo fmt --check
        run: cargo fmt --all -- --check || (echo "::warning::Run 'cargo fmt' locally" && true)

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings || true

      - name: cargo build --release
        run: cargo build --release

      - name: cargo test
        run: cargo test --all-features || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: server-rust
          file: server-rust/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            SQLX_OFFLINE=true

# ────────────────────────────────────────────────────────────────────────────
# Node.js legacy server
# ────────────────────────────────────────────────────────────────────────────
  node:
    name: Node.js Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test || true
