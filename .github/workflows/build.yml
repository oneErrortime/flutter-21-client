name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ────────────────────────────────────────────────────────────────────────────
# Android APK + App Bundle
# ────────────────────────────────────────────────────────────────────────────
jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    outputs:
      apk-arm64: ${{ steps.paths.outputs.arm64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_ROOT }}/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Create a debug keystore for signing the test APK.
      # For production: add KEYSTORE_B64 / KEY_ALIAS / KEY_PASSWORD secrets.
      - name: Create keystore
        run: |
          mkdir -p android/keystore
          keytool -genkeypair -v \
            -keystore android/keystore/release.jks \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=VoiceCall CI, OU=CI, O=VoiceCall, L=CI, ST=CI, C=US" \
            -storepass cipass123 -keypass cipass123

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT"  >> android/local.properties

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=cipass123
          keyPassword=cipass123
          keyAlias=release
          storeFile=keystore/release.jks
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: flutter test
        run: flutter test --coverage || true

      # ── Debug APK (quick feedback) ─────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      # ── Release APKs (split by ABI) ────────────────────────────────────────
      - name: Build release APKs
        env:
          KEYSTORE_PATH: keystore/release.jks
          KEY_ALIAS: release
          KEY_PASSWORD: cipass123
          STORE_PASSWORD: cipass123
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --target-platform android-arm64,android-arm,android-x64 \
            --split-per-abi

      # ── App Bundle (Play Store) ────────────────────────────────────────────
      - name: Build App Bundle
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info || true

      - name: List APK outputs
        run: find build/app/outputs -name "*.apk" -o -name "*.aab" | sort

      - id: paths
        run: |
          echo "arm64=$(ls build/app/outputs/flutter-apk/app-arm64-v8a-release.apk 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

      # ── GitHub Release on tag push ─────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

# ────────────────────────────────────────────────────────────────────────────
# Flutter Web → GitHub Pages
# Browser-based test client — no Android device needed
# ────────────────────────────────────────────────────────────────────────────
  web:
    name: Flutter Web + GitHub Pages
    runs-on: ubuntu-latest
    # Only deploy on main/master branch pushes and tags, not PRs
    if: github.event_name != 'pull_request'

    permissions:
      contents: write   # needed for gh-pages deployment
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      # ── Build Flutter web app ─────────────────────────────────────────────
      - name: Build Flutter Web
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit \
            --dart-define=FLUTTER_WEB_AUTO_DETECT=true \
            --base-href "/${{ github.event.repository.name }}/"

      # ── Copy standalone WebRTC test client into web output ────────────────
      - name: Copy web test client
        run: |
          cp webclient/index.html build/web/webclient.html

      # ── Inject server URL config into both pages ──────────────────────────
      - name: Create server config
        run: |
          cat > build/web/config.js << 'JS'
          // Auto-configured by CI. Edit these for your server.
          window.VOICECALL_CONFIG = {
            serverUrl: "wss://your-server.com/ws",
            apiBase:   "https://your-server.com",
          };
          JS

          # Inject config.js into Flutter app
          sed -i 's|</head>|<script src="config.js"></script>\n</head>|' build/web/index.html || true

          # Inject config.js into standalone test client
          sed -i 's|</head>|<script src="config.js"></script>\n</head>|' build/web/webclient.html || true

      # ── Create Pages index showing both apps ──────────────────────────────
      - name: Create landing page
        run: |
          cat > build/web/landing.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="utf-8">
          <title>VoiceCall — Test Builds</title>
          <style>
            body { font-family: system-ui; background: #0d0d1a; color: #e0e0e0; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
            .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; padding: 24px; }
            .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 32px; max-width: 300px; text-align: center; }
            .card h2 { margin-bottom: 8px; }
            .card p { color: #888; margin-bottom: 20px; font-size: 14px; }
            a.btn { display: inline-block; padding: 10px 24px; background: #533483; color: white; border-radius: 8px; text-decoration: none; font-weight: 600; }
            a.btn:hover { background: #6040a0; }
          </style>
          </head>
          <body>
          <div class="cards">
            <div class="card">
              <h2>⚡ Standalone Test Client</h2>
              <p>Pure HTML/JS WebRTC test client. Works in any browser. No Flutter needed. Connect to your signaling server and test calls.</p>
              <a class="btn" href="webclient.html">Open Test Client</a>
            </div>
            <div class="card">
              <h2>📱 Flutter Web App</h2>
              <p>Full Flutter web build of the VoiceCall app. Same codebase as Android. Requires WebRTC support (Chrome/Firefox/Safari).</p>
              <a class="btn" href="index.html">Open Flutter App</a>
            </div>
          </div>
          </body>
          </html>
          HTML

      # ── Upload Pages artifact ─────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      # ── Deploy to GitHub Pages ────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: pages
        uses: actions/deploy-pages@v4

      - name: Print live URLs
        run: |
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "🌐 Landing page:   ${BASE}/landing.html"
          echo "⚡ Test client:    ${BASE}/webclient.html"
          echo "📱 Flutter web:    ${BASE}/"

# ────────────────────────────────────────────────────────────────────────────
# Rust server — fmt / clippy / build / test / Docker
# ────────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust Server
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server-rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-rust

      - name: cargo fmt --check
        run: cargo fmt --all -- --check || (echo "::warning::cargo fmt check failed — run 'cargo fmt' locally" && true)

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings || true

      - name: cargo build --release
        run: cargo build --release

      - name: cargo test
        run: cargo test --all-features || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: server-rust
          file: server-rust/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

# ────────────────────────────────────────────────────────────────────────────
# Node.js legacy server
# ────────────────────────────────────────────────────────────────────────────
  node:
    name: Node.js Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test || true
