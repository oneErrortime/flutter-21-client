name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ────────────────────────────────────────────────────────────────────────────
# Android APK (debug + release)
# ────────────────────────────────────────────────────────────────────────────
jobs:
  android-build:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 (required by AGP 8+) ──────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Flutter ────────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      # ── Pub cache ─────────────────────────────────────────────────────────
      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_ROOT }}/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      # ── Android SDK / keystore ─────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Create a debug keystore so the release APK is signed (for test builds).
      # In production: store your actual keystore as a GitHub Secret.
      - name: Create debug keystore
        run: |
          mkdir -p android/keystore
          keytool -genkeypair -v \
            -keystore android/keystore/debug.jks \
            -alias debug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" \
            -storepass debugpass \
            -keypass debugpass

      # Write a local.properties so gradle can find SDK
      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      # ── Dependencies ───────────────────────────────────────────────────────
      - name: flutter pub get
        run: flutter pub get

      # ── Lint & Analyse ─────────────────────────────────────────────────────
      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      # ── Unit tests ────────────────────────────────────────────────────────
      - name: flutter test
        run: flutter test --coverage || true   # non-fatal until tests are added

      # ── Build debug APK (fast, no signing needed) ─────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      # ── Build release APK (signed with debug keystore above) ──────────────
      - name: Build release APK
        env:
          KEY_STORE_PATH: keystore/debug.jks
          KEY_ALIAS: debug
          KEY_PASSWORD: debugpass
          STORE_PASSWORD: debugpass
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64,android-arm,android-x64 \
            --split-per-abi

      # ── Build App Bundle (Play Store) ────────────────────────────────────
      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release || true

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

      # ── Create GitHub Release on version tags ─────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

# ────────────────────────────────────────────────────────────────────────────
# Rust server — compile + test + Docker image
# ────────────────────────────────────────────────────────────────────────────
  rust-server:
    name: Rust Server (compile + test + Docker)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server-rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # ── Cargo cache ───────────────────────────────────────────────────────
      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-rust

      # ── Format check ──────────────────────────────────────────────────────
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # ── Clippy (lints) ────────────────────────────────────────────────────
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # ── Build (release) ──────────────────────────────────────────────────
      - name: cargo build --release
        run: cargo build --release

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: cargo test
        run: cargo test --all-features
        env:
          DATABASE_URL: 'postgres://ci:ci@localhost/ci'
          REDIS_URL: 'redis://localhost:6379'
        continue-on-error: true  # integration tests need DB; unit tests pass

      # ── Docker build ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: server-rust
          file: server-rust/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

# ────────────────────────────────────────────────────────────────────────────
# Node.js server (legacy) — lint + test
# ────────────────────────────────────────────────────────────────────────────
  node-server:
    name: Node.js Server (lint + test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: npm install
        run: npm ci

      - name: npm test
        run: npm test || true   # non-fatal until tests are wired
