<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceCall Docs</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/dart.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>

  <!-- marked.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --bg2:       #161b22;
      --bg3:       #1c2128;
      --bg4:       #21262d;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #1f6feb;
      --accent-dim:rgba(88,166,255,.1);
      --green:     #3fb950;
      --green-dim: rgba(63,185,80,.1);
      --purple:    #bc8cff;
      --orange:    #d29922;
      --red:       #f85149;
      --text:      #e6edf3;
      --text-mid:  #8b949e;
      --text-dim:  #484f58;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Inter', sans-serif;
      --sidebar-w: 260px;
      --nav-h:     58px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── Topnav ── */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--nav-h);
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px;
      background: rgba(13,17,23,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    #mobile-menu-btn {
      display: none; background: none; border: none;
      color: var(--text-mid); cursor: pointer;
      font-size: 18px; padding: 4px 6px; border-radius: 4px;
    }
    #mobile-menu-btn:hover { background: var(--bg4); color: var(--text); }

    .nav-logo {
      display: flex; align-items: center; gap: 9px;
      font-family: var(--mono); font-size: 14.5px; font-weight: 600;
      color: var(--text); text-decoration: none;
    }
    .nav-logo .accent { color: var(--accent); }
    .nav-spacer { flex: 1; }

    .search-wrap {
      position: relative;
    }
    #search-input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 6px 12px 6px 32px;
      width: 200px;
      outline: none;
      transition: border-color .15s, width .2s;
    }
    #search-input:focus { border-color: var(--accent); width: 260px; }
    #search-input::placeholder { color: var(--text-dim); }
    .search-icon {
      position: absolute; left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim); font-size: 12px; pointer-events: none;
    }

    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-links a {
      color: var(--text-mid); text-decoration: none;
      font-size: 13px; padding: 5px 10px; border-radius: 5px;
      transition: color .15s, background .15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--bg4); }
    .nav-gh {
      display: flex; align-items: center; gap: 6px;
      border: 1px solid var(--border) !important;
    }
    .nav-gh:hover { border-color: var(--text-mid) !important; }

    /* ── Layout ── */
    .layout {
      display: flex;
      margin-top: var(--nav-h);
      min-height: calc(100vh - var(--nav-h));
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      position: fixed;
      top: var(--nav-h); bottom: 0; left: 0;
      overflow-y: auto; overflow-x: hidden;
      padding: 20px 12px 60px;
      border-right: 1px solid var(--border);
      background: var(--bg);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); }

    .nav-section { margin-bottom: 20px; }
    .nav-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: .09em;
      text-transform: uppercase; color: var(--text-dim);
      padding: 0 8px; margin-bottom: 4px;
    }
    .nav-link {
      display: block; padding: 5px 10px;
      color: var(--text-mid); text-decoration: none;
      font-size: 13.5px; border-radius: 5px;
      border-left: 2px solid transparent;
      transition: color .12s, background .12s, border-color .12s;
    }
    .nav-link:hover { color: var(--text); background: var(--bg4); }
    .nav-link.active {
      color: var(--accent);
      background: var(--accent-dim);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    .tag {
      float: right; font-size: 10px; font-weight: 700;
      font-family: var(--mono); padding: 1px 5px;
      border-radius: 4px; margin-top: 2px;
    }
    .tag-new { background: var(--green-dim); color: var(--green); border: 1px solid rgba(63,185,80,.2); }
    .tag-e2e { background: rgba(188,140,255,.1); color: var(--purple); border: 1px solid rgba(188,140,255,.2); }

    /* ── Content ── */
    #content {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-width: 0;
    }

    .doc-body {
      max-width: 800px;
      padding: 48px 56px 100px;
      margin: 0 auto;
    }

    .doc-footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .edit-link {
      color: var(--text-dim); text-decoration: none; font-size: 13px;
    }
    .edit-link:hover { color: var(--accent); }

    /* ── TOC ── */
    #toc {
      float: right;
      width: 200px;
      margin: 0 0 24px 32px;
      padding: 14px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12.5px;
    }
    .toc-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 8px;
    }
    #toc ul { list-style: none; }
    #toc li { margin: 0; }
    #toc a {
      color: var(--text-mid); text-decoration: none;
      display: block; padding: 3px 0;
      transition: color .12s;
      line-height: 1.4;
    }
    #toc a:hover { color: var(--accent); }
    #toc .toc-sub { padding-left: 12px; }
    #toc .toc-sub a { font-size: 12px; }

    /* ── Markdown styles ── */
    .doc-markdown h1 {
      font-size: 28px; font-weight: 700;
      letter-spacing: -.02em; line-height: 1.25;
      margin-bottom: 20px;
    }
    .doc-markdown h2 {
      font-size: 20px; font-weight: 600;
      margin: 40px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .doc-markdown h3 {
      font-size: 15px; font-weight: 600;
      margin: 28px 0 10px;
      color: var(--text);
    }
    .doc-markdown p {
      color: var(--text-mid); margin-bottom: 16px; line-height: 1.75;
    }
    .doc-markdown a { color: var(--accent); text-decoration: none; }
    .doc-markdown a:hover { text-decoration: underline; }
    .doc-markdown strong { color: var(--text); font-weight: 600; }
    .doc-markdown em { font-style: italic; color: var(--text-mid); }

    .doc-markdown code {
      font-family: var(--mono); font-size: 12.5px;
      background: var(--bg3); color: #79c0ff;
      padding: 2px 5px; border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Code blocks */
    .codeblock {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; margin: 18px 0; overflow: hidden;
    }
    .codeblock-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    .codeblock-lang {
      font-size: 10.5px; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; color: var(--text-dim);
      font-family: var(--mono);
    }
    .codeblock-copy {
      font-size: 11px; color: var(--text-dim);
      background: none; border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 8px;
      cursor: pointer; font-family: var(--sans);
      transition: color .12s, border-color .12s;
    }
    .codeblock-copy:hover { color: var(--text); border-color: var(--text-mid); }
    .codeblock pre {
      padding: 16px 18px; overflow-x: auto;
      font-size: 13px; line-height: 1.65;
    }
    .codeblock pre code {
      background: none; border: none; padding: 0;
      color: inherit; font-size: inherit;
    }

    /* Tables */
    .table-wrap { overflow-x: auto; margin: 18px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead tr { background: var(--bg3); }
    th {
      text-align: left; padding: 9px 14px;
      font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--text-dim); border-bottom: 1px solid var(--border);
    }
    td {
      padding: 9px 14px; color: var(--text-mid);
      border-bottom: 1px solid var(--border); vertical-align: top;
    }
    tr:hover td { background: rgba(255,255,255,.02); }
    td code { font-size: 12px; }

    /* Callout (blockquote) */
    .callout {
      display: flex; gap: 12px;
      padding: 12px 14px; border-radius: 7px;
      margin: 18px 0; border: 1px solid;
    }
    .callout-info {
      background: var(--accent-dim);
      border-color: rgba(88,166,255,.2);
    }
    .callout-info .callout-body { color: #79c0ff; }
    .callout-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .callout-body { font-size: 13.5px; line-height: 1.7; }
    .callout-body p { color: inherit; margin: 0; }

    /* Lists */
    .doc-markdown ul, .doc-markdown ol {
      padding-left: 22px; margin-bottom: 16px; color: var(--text-mid);
    }
    .doc-markdown li { margin-bottom: 6px; line-height: 1.6; }

    /* hr */
    .doc-markdown hr {
      border: none; border-top: 1px solid var(--border);
      margin: 36px 0;
    }

    /* Error */
    .error {
      padding: 24px; color: var(--red);
      font-family: var(--mono); font-size: 13px;
    }

    /* Overlay */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 150;
    }
    #overlay.open { display: block; }

    /* Mobile */
    @media (max-width: 900px) {
      #sidebar {
        transform: translateX(-100%);
        transition: transform .22s ease;
        z-index: 160;
      }
      #sidebar.open { transform: none; }
      #content { margin-left: 0; }
      #mobile-menu-btn { display: block; }
      .doc-body { padding: 28px 20px 80px; }
      #toc { display: none; }
    }
    @media (max-width: 560px) {
      #search-input { display: none; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<!-- Topnav -->
<nav class="topnav">
  <button id="mobile-menu-btn">☰</button>
  <a href="." class="nav-logo">📞 voice<span class="accent">call</span> <span style="color:var(--text-dim);font-weight:400;font-size:12px;margin-left:4px">docs</span></a>
  <div class="nav-spacer"></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Search docs..." autocomplete="off" />
  </div>
  <div class="nav-links">
    <a href="https://github.com/oneErrortime/flutter-21-client" target="_blank" class="nav-gh">

  </div>
</nav>

<div id="overlay"></div>

<!-- Layout -->
<div class="layout">
  <aside id="sidebar">
    <div id="nav-list"></div>
  </aside>
  <main id="content">
    <div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--text-dim);font-size:14px;">
      Loading…
    </div>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
